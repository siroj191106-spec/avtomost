<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVTOMOST — Koreyadan Markaziy Osiyoga moshina</title>
<meta name="description" content="AVTOMOST — Koreyadan O'zbekiston va Markaziy Osiyoga to'g'ridan-to'g'ri, shaffof narxda moshina import. Eshikkacha narxni qonun bo'yicha hisoblang.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f8cff'/%3E%3Cpath d='M6 19l1.6-4a3 3 0 0 1 2.8-2h11.2a3 3 0 0 1 2.8 2L26 19M9 22h14' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='11' cy='22' r='1.6' fill='white'/%3E%3Ccircle cx='21' cy='22' r='1.6' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070912;--bg-soft:#0c1020;--panel:rgba(255,255,255,.035);--panel2:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.09);--line2:rgba(255,255,255,.14);
  --txt:#f3f5ff;--muted:#9aa6c9;--faint:#6b7699;
  --a1:#4f8cff;--a2:#22d3ee;--a3:#8b5cf6;--ok:#34d399;--warn:#fbbf24;--danger:#fb7185;
  --grad:linear-gradient(120deg,#4f8cff,#22d3ee);--grad3:linear-gradient(120deg,#8b5cf6,#4f8cff,#22d3ee);
  --glow:0 18px 50px -12px rgba(34,121,255,.45);--shadow:0 20px 60px -20px rgba(0,0,0,.7);--r:18px;
  --c-price:#4f8cff;--c-logi:#22d3ee;--c-duty:#8b5cf6;--c-excise:#f472b6;--c-util:#fbbf24;--c-vat:#fb7185;--c-comm:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
#how,#calc,#why,#partners,#lead{scroll-margin-top:84px}
#app{animation:viewfade .38s cubic-bezier(.2,.7,.2,1)}
@keyframes viewfade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,summary:focus-visible{outline:2px solid var(--a2);outline-offset:2px;border-radius:8px}
::selection{background:rgba(79,140,255,.35);color:#fff}
.carcard,.fchip,.car-cta,.btn,.opt-card{will-change:transform}
@media(max-width:560px){h2.title{font-size:27px}.hero h1{font-size:30px}.total-val{font-size:38px}}
h1,h2,h3{font-family:'Manrope',sans-serif}
a{color:inherit;text-decoration:none;cursor:pointer}
.wrap{max-width:1280px;margin:0 auto;padding:0 22px}
.narrow{max-width:920px}
.grad-txt{background:var(--grad3);-webkit-background-clip:text;background-clip:text;color:transparent}
.bgfx{position:fixed;inset:0;z-index:-1;overflow:hidden}
.bgfx i{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45}
.bgfx .b1{width:540px;height:540px;background:#1e40af;top:-170px;right:-120px}
.bgfx .b2{width:460px;height:460px;background:#0e7490;bottom:-180px;left:-150px;opacity:.38}
.bgfx .b3{width:420px;height:420px;background:#6d28d9;top:42%;left:46%;opacity:.22}
.gridlines{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(circle at 50% 0%,#000,transparent 75%)}

/* header */
header{position:sticky;top:0;z-index:60;background:rgba(7,9,18,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.nav{display:flex;align-items:center;justify-content:space-between;height:66px}
.logo{font-family:'Manrope';font-weight:800;font-size:22px;display:flex;align-items:center;gap:10px}
.logo b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo .mk{width:30px;height:30px;border-radius:9px;background:var(--grad);display:grid;place-items:center;box-shadow:var(--glow)}
.logo .mk svg{width:18px;height:18px}
.menu{display:flex;gap:22px;align-items:center}
.menu a{color:var(--muted);font-size:15px;font-weight:500;transition:.2s}
.menu a:hover,.menu a.act{color:var(--txt)}
.controls{display:flex;gap:10px;align-items:center}
.lang select{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);border-radius:10px;padding:8px 11px;font-size:14px;cursor:pointer;font-family:'Inter'}
.btn{background:var(--grad);color:#04122e;font-weight:700;font-family:'Manrope';border:none;padding:11px 18px;border-radius:11px;cursor:pointer;font-size:14.5px;transition:.18s;box-shadow:var(--glow)}
.btn:hover{transform:translateY(-2px)}
.btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line2);box-shadow:none;font-weight:600}
.btn.ghost:hover{background:rgba(255,255,255,.1)}
.btn.lg{padding:14px 24px;font-size:16px}
.menu-btn{display:none;background:var(--panel2);border:1px solid var(--line2);color:var(--txt);width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer}
@media(max-width:880px){.menu{display:none}.menu.open{display:flex;position:absolute;top:66px;left:0;right:0;flex-direction:column;background:rgba(7,9,18,.97);padding:16px 22px;gap:16px;border-bottom:1px solid var(--line)}.menu-btn{display:block}}

/* generic */
section{padding:64px 0;position:relative}
.eyebrow{color:var(--a2);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-size:12.5px;font-family:'Manrope'}
h2.title{font-size:34px;font-weight:800;margin:10px 0 10px;letter-spacing:-.5px}
.lead{color:var(--muted);max-width:660px;margin-bottom:34px;font-size:16px}
.grid{display:grid;gap:18px}
.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:1.05fr .95fr}
@media(max-width:920px){.g3,.g4,.g2{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:24px;backdrop-filter:blur(8px);transition:transform .25s,border-color .25s,background .25s}
.card.hov:hover{transform:translateY(-5px);border-color:var(--line2);background:var(--panel2)}
.panel{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--r);padding:24px}
.step-num{width:46px;height:46px;border-radius:14px;background:var(--grad);color:#04122e;font-weight:800;font-family:'Manrope';display:grid;place-items:center;font-size:19px;margin-bottom:16px;box-shadow:var(--glow)}
.card h3{font-size:18px;margin-bottom:8px;font-weight:700}.card p{color:var(--muted);font-size:14.5px}
.ico-box{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,rgba(79,140,255,.22),rgba(34,211,238,.18));display:grid;place-items:center;font-size:24px;margin-bottom:14px;border:1px solid var(--line2)}
.crumb{font-size:13.5px;color:var(--faint);margin:18px 0 10px}.crumb a:hover{color:var(--txt)}
.note{font-size:12px;color:var(--faint);margin-top:14px;line-height:1.5;padding:12px 14px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);border-radius:12px}
.alert{font-size:13px;color:#fecdd3;padding:11px 13px;background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.32);border-radius:12px;margin-top:12px}
label{display:block;font-size:13px;color:var(--muted);margin:13px 0 7px;font-weight:500}
input,select.field,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:12px 13px;font-size:15px;font-family:'Inter';transition:.2s}
input:focus,select.field:focus{outline:none;border-color:var(--a1);background:rgba(79,140,255,.08);box-shadow:0 0 0 3px rgba(79,140,255,.15)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:560px){.row2{grid-template-columns:1fr}}
.seg{display:flex;gap:8px;flex-wrap:wrap;margin-top:7px}
.seg button{flex:1;min-width:78px;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted);padding:11px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:500;transition:.2s}
.seg button:hover{border-color:var(--line2);color:var(--txt)}
.seg button.on{background:var(--grad);color:#04122e;font-weight:700;border-color:transparent;box-shadow:var(--glow)}

/* hero */
.hero{padding:80px 0 60px}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:40px;align-items:center}
@media(max-width:920px){.hero-grid{grid-template-columns:1fr}}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line2);border-radius:30px;padding:7px 14px;font-size:13px;color:var(--muted);margin-bottom:22px}
.chip .pulse{width:8px;height:8px;border-radius:50%;background:var(--a2);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,211,238,.55)}70%{box-shadow:0 0 0 9px rgba(34,211,238,0)}100%{box-shadow:0 0 0 0 rgba(34,211,238,0)}}
.hero h1{font-size:50px;line-height:1.08;font-weight:800;letter-spacing:-1px}
.hero p.sub{color:var(--muted);font-size:18px;margin-top:20px;max-width:560px}
.hero .cta{display:flex;gap:14px;margin-top:30px;flex-wrap:wrap}
.stats{display:flex;gap:14px;margin-top:42px;flex-wrap:wrap}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:15px 19px;min-width:118px}
.stat b{display:block;font-family:'Manrope';font-size:25px;font-weight:800}.stat span{color:var(--faint);font-size:12.5px}
@media(max-width:600px){.hero h1{font-size:34px}.hero{padding:46px 0 30px}}
.hero-visual{position:relative;height:330px;display:grid;place-items:center}
.hero-visual .ring{position:absolute;inset:0;margin:auto;width:320px;height:320px;border-radius:50%;border:1px solid var(--line2);box-shadow:inset 0 0 80px rgba(79,140,255,.18)}
.hero-visual .ring2{width:230px;height:230px;border-style:dashed;opacity:.5;animation:spin 32s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hero-visual .car{position:relative;width:100%;max-width:420px;filter:drop-shadow(0 30px 40px rgba(0,0,0,.6));animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.ftag{position:absolute;background:rgba(12,16,32,.85);border:1px solid var(--line2);backdrop-filter:blur(10px);border-radius:12px;padding:9px 13px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow)}
.ftag .d{width:9px;height:9px;border-radius:50%}
@media(max-width:920px){.hero-visual{height:240px}}

/* calculator */
.calc-shell{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--line2);border-radius:26px;padding:8px;box-shadow:var(--shadow)}
.calc-box{display:grid;grid-template-columns:1.1fr .9fr;gap:8px}
@media(max-width:960px){.calc-box{grid-template-columns:1fr}}
.calc-pane{background:var(--bg-soft);border-radius:20px;padding:26px}
.group-label{font-family:'Manrope';font-size:13px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:1px;margin:20px 0 4px}
.group-label.first{margin-top:0}
.receipt{background:linear-gradient(180deg,#0e1426,#0a0e1c);border-radius:20px;padding:26px;position:sticky;top:84px}
.total-wrap{text-align:center;padding:6px 0 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
.total-lbl{font-size:13px;color:var(--faint);text-transform:uppercase;letter-spacing:1.5px;font-family:'Manrope';font-weight:700}
.total-val{font-family:'Manrope';font-size:44px;font-weight:800;letter-spacing:-1px;margin-top:4px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.bar{height:14px;border-radius:8px;overflow:hidden;display:flex;background:rgba(255,255,255,.05);margin-bottom:16px;box-shadow:inset 0 0 0 1px var(--line)}
.bar i{height:100%;transition:width .5s cubic-bezier(.2,.7,.2,1)}
.ln{display:flex;justify-content:space-between;align-items:center;padding:9px 0;font-size:14.5px}
.ln .lbl{color:var(--muted);display:flex;align-items:center;gap:9px}
.ln .dotc{width:9px;height:9px;border-radius:3px;flex:none}
.ln .v{font-family:'Manrope';font-weight:600}
.ln.hide{display:none}.divider{height:1px;background:var(--line);margin:6px 0}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(52,211,153,.14);color:var(--ok);padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:700;margin-top:12px}
details.settings{margin-top:16px;border-top:1px solid var(--line);padding-top:12px}
details.settings summary{cursor:pointer;color:var(--a2);font-weight:600;list-style:none}
details.settings summary::-webkit-details-marker{display:none}

/* catalog */
.searchrow{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.searchinput{flex:1;min-width:240px;position:relative}
.searchinput svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;opacity:.6}
.searchinput input{padding-left:42px}
.sortsel{background:var(--panel2);border:1px solid var(--line2);color:var(--txt);border-radius:12px;padding:13px;font-size:14.5px;cursor:pointer}
.layout{display:grid;grid-template-columns:262px 1fr;gap:24px;padding:18px 0 40px;align-items:start}
@media(max-width:980px){.layout{grid-template-columns:1fr}.filters{position:static!important}}
.filters{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;position:sticky;top:84px}
.filters h4{font-size:12.5px;text-transform:uppercase;letter-spacing:1px;color:var(--faint);font-family:'Manrope';margin:18px 0 10px}.filters h4:first-child{margin-top:0}
.fchip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--muted);border-radius:30px;padding:8px 13px;font-size:13.5px;cursor:pointer;margin:0 6px 8px 0;transition:.18s}
.fchip:hover{border-color:var(--a1);color:var(--txt)}.fchip.on{background:var(--grad);color:#04122e;font-weight:700;border-color:transparent}
.frange{display:flex;gap:8px}
.fclear{width:100%;margin-top:16px;background:var(--panel2);border:1px solid var(--line2);color:var(--muted);border-radius:11px;padding:10px;cursor:pointer;font-size:13.5px}
.results-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cnt{color:var(--muted);font-size:14.5px}.cnt b{color:var(--txt);font-family:'Manrope'}
.cars{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:1100px){.cars{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.cars{grid-template-columns:1fr}}
.carcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:transform .25s,border-color .25s;cursor:pointer;display:flex;flex-direction:column}
.carcard:hover{transform:translateY(-6px);border-color:var(--line2);box-shadow:var(--shadow)}
.car-img{position:relative;height:166px;background:radial-gradient(120% 130% at 50% 0%,#16284f 0%,#0e1730 55%,#0a1024 100%);display:grid;place-items:center;overflow:hidden}
.car-img svg{width:78%;filter:drop-shadow(0 16px 22px rgba(0,0,0,.55))}
.car-badges{position:absolute;top:11px;left:11px;display:flex;gap:6px}
.cb{background:rgba(8,12,24,.78);backdrop-filter:blur(6px);border:1px solid var(--line2);border-radius:8px;padding:4px 9px;font-size:11.5px;font-weight:600}
.cb.ev{background:rgba(52,211,153,.18);border-color:transparent;color:#6ee7b7}
.fav{position:absolute;top:11px;right:11px;width:32px;height:32px;border-radius:9px;background:rgba(8,12,24,.7);border:1px solid var(--line2);display:grid;place-items:center;font-size:14px}
.car-body{padding:16px 17px 18px;flex:1;display:flex;flex-direction:column}
.car-title{font-family:'Manrope';font-weight:700;font-size:17px;margin-bottom:3px}
.car-sub{color:var(--faint);font-size:12.5px;margin-bottom:12px}
.car-specs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.spec{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12px;color:var(--muted)}
.price-block{margin-top:auto;border-top:1px solid var(--line);padding-top:12px}
.pk{display:flex;justify-content:space-between;font-size:13px;color:var(--faint);margin-bottom:3px}.pk b{color:var(--muted);font-family:'Manrope';font-size:14px}
.pl{display:flex;justify-content:space-between;align-items:baseline}.pl span{font-size:12.5px;color:var(--a2);font-weight:600}
.pl b{font-family:'Manrope';font-size:21px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.car-cta{margin-top:13px;width:100%;background:var(--panel2);border:1px solid var(--line2);color:var(--txt);border-radius:11px;padding:10px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'Manrope'}
.car-cta:hover{background:var(--grad);color:#04122e;border-color:transparent}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:60px 0}

/* detail */
.detail{display:grid;grid-template-columns:1.15fr .85fr;gap:26px;padding:6px 0 40px;align-items:start}
@media(max-width:920px){.detail{grid-template-columns:1fr}}
.gallery{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.gallery .main{height:320px;background:radial-gradient(130% 140% at 50% 0%,#16284f,#0a1024);display:grid;place-items:center}.gallery .main svg{width:72%}
.thumbs{display:flex;gap:8px;padding:12px}
.thumbs .t{flex:1;height:60px;border-radius:10px;background:radial-gradient(120% 130% at 50% 0%,#16284f,#0a1024);border:1px solid var(--line);display:grid;place-items:center;opacity:.7}.thumbs .t svg{width:80%}
.spectable{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.si{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
.si .k{font-size:12px;color:var(--faint)}.si .v{font-family:'Manrope';font-weight:600;margin-top:2px}
.opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.opt{background:rgba(79,140,255,.1);border:1px solid var(--line2);border-radius:20px;padding:6px 12px;font-size:12.5px;color:var(--muted)}
.bd-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);font-size:14.5px}
.bd-line .lbl{color:var(--muted);display:flex;align-items:center;gap:9px}.bd-line .dotc{width:9px;height:9px;border-radius:3px}
.bd-line .v{font-family:'Manrope';font-weight:600}
.bd-line.total{border-bottom:none;font-size:20px;font-weight:800;padding-top:14px}.bd-line.total .v{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

/* stepper / order */
.stepper{display:flex;gap:8px;margin:20px 0 24px}
.stepper .s{flex:1;text-align:center;padding:12px 8px;border-radius:12px;background:var(--panel);border:1px solid var(--line);font-size:13px;color:var(--faint);font-family:'Manrope';font-weight:600}
.stepper .s.on{background:var(--grad);color:#04122e;border-color:transparent}.stepper .s.done{border-color:var(--ok);color:var(--ok)}
.opt-card{display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;margin-bottom:10px;transition:.2s}
.opt-card:hover{border-color:var(--line2)}.opt-card.sel{border-color:var(--a1);background:rgba(79,140,255,.08)}
.opt-card .rd{width:20px;height:20px;border-radius:50%;border:2px solid var(--line2);flex:none;margin-top:2px}
.opt-card.sel .rd{border-color:var(--a1);background:var(--a1);box-shadow:inset 0 0 0 3px var(--bg-soft)}
.paystage{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}.paystage:last-child{border-bottom:none}.paystage .v{font-family:'Manrope';font-weight:700}
.success{text-align:center;padding:30px}.success .ic{width:70px;height:70px;border-radius:50%;background:rgba(52,211,153,.15);display:grid;place-items:center;margin:0 auto 16px;font-size:34px}
.ordernum{font-family:'Manrope';font-size:26px;font-weight:800;letter-spacing:1px;margin:8px 0 18px}

/* tracking */
.ts{display:flex;gap:14px;align-items:flex-start;padding-bottom:22px;position:relative}
.ts:before{content:'';position:absolute;left:13px;top:26px;bottom:-2px;width:2px;background:var(--line)}.ts:last-child:before{display:none}
.ts .dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--line2);background:var(--bg-soft);flex:none;display:grid;place-items:center;font-size:13px;z-index:1}
.ts.done .dot{background:var(--grad);border-color:transparent;color:#04122e}.ts.now .dot{border-color:var(--a2);box-shadow:0 0 0 4px rgba(34,211,238,.2)}
.ts.future{opacity:.45}.ts .tt{font-family:'Manrope';font-weight:600}

/* faq */
.faq-item{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--panel)}
.faq-q{padding:18px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Manrope';font-weight:600;gap:14px}
.faq-q .pm{font-size:22px;color:var(--a2);transition:.2s}.faq-item.open .faq-q .pm{transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease;color:var(--muted);padding:0 20px}.faq-item.open .faq-a{max-height:320px;padding:0 20px 18px}

/* timeline (partners) */
.tl-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line);font-size:15px}
.tl-item .l{display:flex;align-items:center;gap:12px;color:var(--muted)}.tl-item .dotc{width:11px;height:11px;border-radius:50%;background:var(--grad);box-shadow:var(--glow)}
.tl-item.tot{font-weight:700;color:var(--txt);border-bottom:none}
.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);border-radius:30px;padding:9px 15px;font-size:13.5px;color:var(--muted);margin:5px;background:var(--panel)}

footer{border-top:1px solid var(--line);padding:42px 0 30px;color:var(--muted);font-size:14px;margin-top:30px}
.foot{display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap}
.formbox{background:var(--panel);border:1px solid var(--line2);border-radius:22px;padding:30px}

/* ===== Encar-uslubidagi boy komponentlar (AVTOMOST brendida) ===== */
/* sort tabs */
.sorttabs{display:flex;gap:4px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:16px}
.sorttabs button{background:none;border:none;color:var(--muted);padding:9px 14px;border-radius:9px;font-size:13.5px;cursor:pointer;font-family:'Manrope';font-weight:600;transition:.18s}
.sorttabs button:hover{color:var(--txt)}
.sorttabs button.on{background:var(--grad);color:#04122e}
/* filter accordion */
.facc{border-bottom:1px solid var(--line)}
.facc:last-child{border-bottom:none}
.facc h4{display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin:0;padding:14px 0;font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-family:'Manrope'}
.facc h4 .cv{transition:.2s;color:var(--faint)}
.facc.open h4 .cv{transform:rotate(180deg)}
.facc .fbody{max-height:0;overflow:hidden;transition:max-height .28s ease}
.facc.open .fbody{max-height:520px;padding-bottom:14px}
.frow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:14px;color:var(--muted);cursor:pointer;border-radius:8px}
.frow:hover{color:var(--txt)}
.frow.on{color:var(--a2);font-weight:600}
.frow .ck{width:17px;height:17px;border:1.5px solid var(--line2);border-radius:5px;display:grid;place-items:center;flex:none}
.frow.on .ck{background:var(--grad);border-color:transparent}
.frow .cnt{color:var(--faint);font-size:12.5px;font-variant-numeric:tabular-nums}
/* enriched list card */
.lcard{display:grid;grid-template-columns:280px 1fr auto;gap:18px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;transition:.22s;align-items:center}
.lcard:hover{border-color:var(--line2);transform:translateY(-3px);box-shadow:var(--shadow)}
@media(max-width:760px){.lcard{grid-template-columns:1fr}}
.lphotos{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lph{height:96px;border-radius:10px;background:radial-gradient(120% 130% at 50% 0%,#16284f,#0a1024);display:grid;place-items:center;overflow:hidden;position:relative}
.lph svg{width:90%}
.lph .dg{position:absolute;top:6px;left:6px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
.linfo .lt{font-family:'Manrope';font-weight:700;font-size:17px}
.linfo .ls{color:var(--faint);font-size:13px;margin:3px 0 8px}
.ltags{display:flex;gap:6px;flex-wrap:wrap}
.ltag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--line)}
.ltag.hot{background:rgba(251,113,133,.16);color:#fda4af;border-color:transparent}
.ltag.eco{background:rgba(52,211,153,.16);color:#6ee7b7;border-color:transparent}
.ltag.af{background:rgba(34,211,238,.14);color:#67e8f9;border-color:transparent}
.lprice{text-align:right;min-width:150px}
.lprice .lk{font-size:12px;color:var(--faint)}
.lprice .lkv{font-family:'Manrope';font-weight:600;font-size:14px;color:var(--muted)}
.lprice .llv{font-family:'Manrope';font-weight:800;font-size:22px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin-top:2px}
.viewtoggle{display:flex;gap:6px}
.viewtoggle button{background:var(--panel2);border:1px solid var(--line2);color:var(--muted);width:38px;height:38px;border-radius:10px;cursor:pointer;display:grid;place-items:center}
.viewtoggle button.on{background:var(--grad);color:#04122e;border-color:transparent}
/* detail tabs */
.dtabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:22px;overflow-x:auto}
.dtabs button{background:none;border:none;color:var(--muted);padding:14px 16px;font-size:15px;font-family:'Manrope';font-weight:600;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.dtabs button.on{color:var(--txt);border-bottom-color:var(--a2)}
.dsec{display:none}.dsec.show{display:block}
/* option grid */
.optgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:8px}
@media(max-width:680px){.optgrid{grid-template-columns:repeat(3,1fr)}}
.optitem{text-align:center;padding:14px 8px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.02)}
.optitem.off{opacity:.32}
.optitem .oi{display:grid;place-items:center;margin-bottom:8px}
.optitem .ol{font-size:12px;color:var(--muted)}
/* condition */
.condhead{display:flex;align-items:center;gap:10px;font-family:'Manrope';font-weight:700;font-size:18px;margin-bottom:14px}
.condhead .ok{width:26px;height:26px;border-radius:50%;background:rgba(52,211,153,.18);display:grid;place-items:center}
.condrow{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px}
.condrow .cg{color:var(--ok);font-weight:600}
.inspcard{background:#0a0e1c;border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:18px}
.inspcard .ih{display:flex;align-items:center;gap:10px;color:var(--ok);font-family:'Manrope';font-weight:700;margin-bottom:14px}
.inspbars{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inspbar{height:60px;border-radius:10px;background:linear-gradient(135deg,rgba(52,211,153,.12),rgba(34,211,238,.08));border:1px solid rgba(52,211,153,.25);display:grid;place-items:center;color:var(--ok);font-size:12.5px;text-align:center}
/* buy-box */
.buybox{background:var(--bg-soft);border:1px solid var(--line);border-radius:18px;padding:22px;position:sticky;top:84px}
.bb-price{font-family:'Manrope';font-weight:800;font-size:32px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.bb-sub{font-size:12.5px;color:var(--faint)}
.bb-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
.bb-row:last-of-type{border-bottom:none}
.bb-row .v{font-family:'Manrope';font-weight:600}
.bb-tcc{display:flex;justify-content:space-between;align-items:center;background:rgba(79,140,255,.08);border:1px solid var(--line2);border-radius:12px;padding:12px 14px;margin:14px 0;cursor:pointer}
.bb-tcc:hover{background:rgba(79,140,255,.14)}
.bb-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.bb-mini{background:var(--panel2);border:1px solid var(--line2);color:var(--muted);border-radius:11px;padding:11px;font-size:12.5px;text-align:center;cursor:pointer}
.bb-mini:hover{color:var(--txt)}
.thumbrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.thumb{width:72px;height:54px;border-radius:9px;background:radial-gradient(120% 130% at 50% 0%,#16284f,#0a1024);border:2px solid transparent;display:grid;place-items:center;cursor:pointer;overflow:hidden}
.thumb svg{width:84%}.thumb.on{border-color:var(--a2)}
.galmain{height:340px;border-radius:16px;background:radial-gradient(130% 140% at 50% 0%,#16284f,#0a1024);display:grid;place-items:center;position:relative;overflow:hidden}
.galmain svg{width:74%}
.galmeta{position:absolute;top:12px;left:14px;font-size:12px;color:var(--faint)}
.galnav{position:absolute;bottom:12px;right:14px;display:flex;gap:8px}
.galnav button{width:34px;height:34px;border-radius:9px;background:rgba(8,12,24,.7);border:1px solid var(--line2);color:var(--txt);display:grid;place-items:center;cursor:pointer}

/* ============================================================
   YORUG' (LIGHT) TEMA — toza, Encar uslubidagi marketplace ko'rinishi
   (AVTOMOST brendida — ranglar/kontent o'ziniki)
   ============================================================ */
:root{
  --bg:#ffffff;--bg-soft:#f5f7fa;--panel:#ffffff;--panel2:#f1f4f8;
  --line:#e7eaef;--line2:#d6dbe3;
  --txt:#101524;--muted:#5a6679;--faint:#8a93a4;
  --a1:#2563eb;--a2:#2563eb;--a3:#7c5cfc;
  --grad:linear-gradient(120deg,#2563eb,#3b82f6);
  --grad3:linear-gradient(120deg,#2563eb,#3b82f6);
  --glow:0 10px 24px -10px rgba(37,99,235,.35);
  --shadow:0 14px 36px -16px rgba(20,30,60,.20);
}
body{background:#fff;color:var(--txt)}
.bgfx,.gridlines{display:none!important}
header{background:rgba(255,255,255,.92)!important;border-bottom:1px solid var(--line)}
.btn.ghost{background:#fff;border:1px solid var(--line2);color:var(--txt)}
.btn.ghost:hover{background:#f5f7fa}
.lang select{background:#fff;border:1px solid var(--line2);color:var(--txt)}
input,select.field,textarea{background:#fff;border:1px solid var(--line2);color:var(--txt)}
input:focus,select.field:focus,textarea:focus{background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.14)}
.seg button{background:#fff;border:1px solid var(--line2);color:var(--muted)}
.card{background:#fff!important;border:1px solid var(--line);backdrop-filter:none;box-shadow:0 1px 3px rgba(20,30,60,.05)}
.card.hov:hover{background:#fff!important;box-shadow:var(--shadow)}
.panel{background:#fff}
.ico-box{background:linear-gradient(135deg,#e8efff,#e6f7ff);border:1px solid #d6e4ff}
.chip{background:#f1f4f8;border:1px solid var(--line2);color:var(--muted)}
.stat{background:#fff;border:1px solid var(--line)}
.hero-visual .ring{border-color:var(--line2);box-shadow:none}
.ftag{background:rgba(255,255,255,.96)!important;border:1px solid var(--line2);color:var(--txt);box-shadow:var(--shadow)}
.calc-shell{background:#fff;border:1px solid var(--line)}
.calc-pane{background:#f5f7fa}
.receipt{background:#fff;border:1px solid var(--line)}
.bar{background:#eef1f6;box-shadow:inset 0 0 0 1px var(--line)}
.note{background:#fff8ec;border:1px solid #ffe2b0;color:#8a6d2f}
/* katalog */
.filters{background:#fff;border:1px solid var(--line)}
.sorttabs{background:#fff;border:1px solid var(--line)}
.sortsel,.viewtoggle button{background:#fff;border:1px solid var(--line2);color:var(--muted)}
.fchip,.pill{background:#fff;border:1px solid var(--line2);color:var(--muted)}
.frow:hover{background:#f5f7fa}
.carcard,.lcard{background:#fff;border:1px solid var(--line)}
.car-img,.lph,.galmain,.gallery .main,.thumb{background:#eef1f6!important}
.car-img{height:auto!important;aspect-ratio:16/11;display:flex;align-items:center;justify-content:center;position:relative}
.car-img svg{width:auto}
.ph-ico{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.ph-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:8px;z-index:2}
.car-img,.lph,.galmain{overflow:hidden}
.ph-illus{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(130% 130% at 50% 6%,#fbfcfe 0%,#eaeef4 64%,#e1e6ee 100%)}
.ph-illus svg{width:92%;height:92%}
.ph-wm{position:absolute;left:13px;top:11px;font-family:'Manrope',sans-serif;font-weight:800;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(16,21,36,.30)}
.thumb .ph-wm{display:none}.thumb .ph-illus svg{width:82%;height:82%}
/* tavsiya belgisi */
.recwrap{position:absolute;left:10px;top:10px;z-index:3}
.recb{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;letter-spacing:.2px;white-space:nowrap}
.recb.ok{background:#dcfce7;color:#15803d}.recb.mid{background:#fef3c7;color:#b45309}.recb.no{background:#fee2e2;color:#b91c1c}
.cp-land{font-size:17.5px}
.mk{color:#b45309;font-weight:700}
.cmpbtn{margin-top:10px;width:100%;background:#f1f4f8;border:1px solid var(--line2);color:var(--muted);font-size:12.5px;font-weight:600;padding:7px;border-radius:9px;cursor:pointer;transition:.16s}
.cmpbtn:hover{background:#e7ecf3}.cmpbtn.on{background:#eef3ff;border-color:var(--a1);color:var(--a2)}
/* solishtirish paneli (pastda yopishadi) */
.cmpbar{position:sticky;bottom:0;z-index:40;background:rgba(255,255,255,.97);border-top:1px solid var(--line2);box-shadow:0 -6px 24px rgba(20,30,60,.10);backdrop-filter:blur(6px)}
.cmpbar-in{max-width:1180px;margin:auto;padding:12px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cmpcount{font-weight:700;font-size:13.5px;color:var(--a2)}
.cmpchip{background:#f1f4f8;border:1px solid var(--line2);border-radius:20px;padding:5px 10px;font-size:12.5px;display:inline-flex;gap:7px;align-items:center}
.cmpchip b{cursor:pointer;color:var(--faint);font-weight:700}.cmpchip b:hover{color:var(--danger)}
.btn.sm{padding:8px 14px;font-size:13px}.btn.sm.ghost{background:#fff;border:1px solid var(--line2);color:var(--muted)}
.btn.sm[disabled]{opacity:.45;pointer-events:none}
/* solishtirish jadvali */
.cmptable-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:#fff}
.cmptable{width:100%;border-collapse:collapse;min-width:520px}
.cmptable td,.cmptable th{padding:11px 14px;text-align:center;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
.cmptable tr:last-child td,.cmptable tr:last-child th{border-bottom:none}
.cmptable .rl{text-align:left;color:var(--faint);font-size:12.5px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;background:#fafbfd;font-weight:600}
.cmphead th{padding-top:16px}
.cmpph{width:150px;max-width:30vw;aspect-ratio:16/11;position:relative;border-radius:10px;overflow:hidden;margin:auto}
.cmpt{font-weight:700;font-size:14.5px;margin-top:8px}
.cmptable td.big b{font-size:18px;color:var(--a2);font-family:'Manrope'}
.bestcell{color:#15803d!important}
.besttag{display:inline-block;font-size:10px;background:#dcfce7;color:#15803d;padding:2px 6px;border-radius:6px;vertical-align:middle;font-family:Inter}
.results-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ratechip{font-size:12px;font-weight:600;color:var(--faint);background:#f3f5f9;border:1px solid var(--line2);padding:4px 10px;border-radius:20px;white-space:nowrap}
.ratechip.live{color:#15803d;background:#ecfdf3;border-color:#bbf7d0}
/* sevimlilar */
.favwrap{position:absolute;right:10px;bottom:10px;z-index:3}
.favbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.96);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.16s;box-shadow:0 2px 8px rgba(20,30,60,.10)}
.favbtn:hover{transform:scale(1.1)}
.favbtn.on{background:#fff0f3;border-color:#fbcfe0}
.favbtn.on svg path{fill:#e11d48;stroke:#e11d48}
.navbadge{display:none;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:10px;background:#e11d48;color:#fff;font-size:11px;font-weight:700;margin-left:4px}
.pd{font-weight:700;font-size:12px}
.pd.down{color:#15803d}.pd.up{color:#b91c1c}.pd.flat{color:var(--faint)}
/* AI maslahatchi */
.navai{font-weight:700}
.advhead{display:flex;gap:14px;align-items:center;margin-bottom:18px}
.advbot{width:52px;height:52px;border-radius:15px;background:linear-gradient(135deg,#2563eb,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;box-shadow:0 6px 18px rgba(37,99,235,.28)}
.advform{max-width:620px}
.advl{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:14px 0 7px}
.advl:first-child{margin-top:0}
.advbudget{display:flex;align-items:center;gap:8px;background:#f5f7fa;border:1px solid var(--line2);border-radius:11px;padding:0 14px}
.advbudget span{font-size:18px;font-weight:700;color:var(--faint)}
.advbudget input{flex:1;border:none;background:transparent;padding:13px 0;font-size:17px;font-weight:700;outline:none;color:var(--txt)}
.advchips{display:flex;flex-wrap:wrap;gap:8px}
.advchip{background:#fff;border:1px solid var(--line2);color:var(--muted);padding:9px 15px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.16s}
.advchip:hover{border-color:var(--a1)}
.advchip.on{background:#eef3ff;border-color:var(--a1);color:var(--a2)}
.advsummary{font-size:15px;font-weight:700;color:var(--a2);background:#eef3ff;border:1px solid #cdddff;border-radius:11px;padding:12px 16px;margin-bottom:16px}
.advrec{position:relative;border:1.5px solid #cdddff!important;box-shadow:0 6px 20px rgba(37,99,235,.08)}
.advrank{position:absolute;left:10px;top:10px;z-index:4;background:linear-gradient(135deg,#2563eb,#22d3ee);color:#fff;font-weight:800;font-size:13px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(37,99,235,.35)}
.advrec .recwrap{left:52px}
.advwhy{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:4px}
.advwhy li{font-size:12.5px;color:#15803d;font-weight:600}
.advtrap{margin-top:16px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.5}
.car-body{padding:12px 14px 14px}
.car-title{font-size:15px;font-weight:600}
.car-sub{font-size:12.5px;color:var(--faint);margin:2px 0 9px}
.cp-land{font-size:19px;font-weight:800;color:var(--a2);font-family:'Manrope';letter-spacing:-.3px}
.cp-kor{font-size:12px;color:var(--faint);margin-top:1px}
.cb{background:rgba(255,255,255,.96);color:#101524;border:1px solid var(--line2);font-weight:600}
.galmain{aspect-ratio:16/10;height:auto!important}.galmain .ph-ico{height:100%}
.cb{background:rgba(255,255,255,.95);color:#101524;border:1px solid var(--line2)}
.cb.ev{background:#dcfce7;color:#15803d;border-color:transparent}
.fav{background:rgba(255,255,255,.95);border:1px solid var(--line2)}
.spec,.opt,.optitem,.si{background:#f5f7fa;border:1px solid var(--line)}
.ltag{background:#f1f4f8;border:1px solid var(--line);color:var(--muted)}
/* detal */
.dtabs{border-bottom:1px solid var(--line)}
.dtabs button.on{color:var(--txt)}
.buybox{background:#fff;border:1px solid var(--line)}
.bb-tcc{background:#eef3ff;border:1px solid #cdddff}
.bb-mini{background:#f5f7fa;border:1px solid var(--line2)}
.galnav button{background:rgba(255,255,255,.95);border:1px solid var(--line2);color:var(--txt)}
.galmeta{color:var(--faint)}
.condrow,.bb-row,.paystage,.tl-item,.ln,.bd-line{border-color:var(--line)}

.opt-card{background:#fff;border:1px solid var(--line)}

.faq-item,.formbox{background:#fff;border:1px solid var(--line)}
footer{border-top:1px solid var(--line)}
::selection{background:rgba(37,99,235,.18);color:#101524}
/* ===== Minimalist polish ===== */
.iconbtn{position:relative;width:39px;height:39px;border-radius:50%;border:1px solid var(--line2);background:#fff;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.16s;padding:0}
.iconbtn:hover{color:var(--a2);border-color:var(--a1);background:#f4f8ff}
.iconbtn .navbadge{position:absolute;top:-3px;right:-3px;margin:0}
header{background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px)}
.nav{gap:20px}
.menu{gap:26px}
.menu a{font-size:14.5px;font-weight:600;color:#6b7488;letter-spacing:-.1px}
.menu a:hover,.menu a.act{color:var(--a2)}
.controls{gap:12px}
.carcard,.lcard{box-shadow:none}
.carcard:hover{box-shadow:0 14px 36px rgba(20,30,60,.09)}
.btn{box-shadow:none}
.panel,.card,.buybox,.formbox,.faq-item{box-shadow:none}
h1{letter-spacing:-1.2px}
@media(max-width:900px){.navhide{display:none}}
/* ===== Mobil header + menyu tuzatishlari ===== */
.menu-lang{display:none}
@media(max-width:880px){
  .menu.open{background:#fff!important;color:var(--txt);box-shadow:0 16px 44px rgba(20,30,60,.16);border-bottom:1px solid var(--line);padding:12px 20px 18px!important;gap:2px!important}
  .menu.open a{color:#1b2330!important;font-size:16px;font-weight:600;padding:13px 2px;border-bottom:1px solid var(--line)}
  .menu.open .navhide{display:block!important}
  .menu.open .menu-lang{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .menu.open .menu-lang button{border:1px solid var(--line2);background:#f5f7fa;border-radius:10px;padding:9px 13px;font-size:13.5px;cursor:pointer;font-weight:600;color:var(--txt)}
}
@media(max-width:680px){
  .nav{height:58px}
  .controls .lang{display:none}
  .controls{gap:8px}
  .iconbtn{width:36px;height:36px}
  .controls .btn{padding:9px 13px;font-size:13.5px}
  .menu-btn{width:36px;height:36px;font-size:16px;border-radius:9px}
  .logo{font-size:18px}
  .menu.open{top:58px}
  h1{letter-spacing:-.6px}
}
/* kabinet / auth modal */
.authmodal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(16,21,36,.45);backdrop-filter:blur(4px);padding:20px}
.authmodal.show{display:flex;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.authcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:20px;padding:28px 26px;width:100%;max-width:380px;box-shadow:0 30px 80px rgba(20,30,60,.25);animation:popin .24s cubic-bezier(.2,.8,.2,1)}

.authlogo{font-family:'Manrope';font-weight:800;font-size:20px;display:flex;align-items:center;gap:8px}

.authtabs button{flex:1;border:none;background:none;padding:9px;border-radius:8px;font-weight:600;font-size:14px;color:var(--muted);cursor:pointer;transition:.15s}
.authtabs button.on{background:#fff;color:var(--a2);box-shadow:0 1px 4px rgba(20,30,60,.08)}
.auin{width:100%;border:1px solid var(--line2);border-radius:11px;padding:12px 14px;font-size:14.5px;margin-bottom:10px;outline:none;transition:.15s;color:var(--txt)}
.auin:focus{border-color:var(--a1);background:#f9fbff}
.auerr{color:var(--danger);font-size:13px;min-height:18px;margin-bottom:2px}
.aunote{color:var(--faint);font-size:11.5px;text-align:center;margin-top:12px;line-height:1.5}
.iconbtn.logged{background:var(--grad);color:#04122e;border-color:transparent}
.acchead{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.accav{width:60px;height:60px;border-radius:50%;background:var(--grad);color:#04122e;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;font-family:'Manrope'}

.accmail{color:var(--faint);font-size:13.5px}

.acctile:hover{border-color:var(--a1);transform:translateY(-2px)}
.acctn{font-size:24px;font-weight:800;color:var(--a2);font-family:'Manrope'}
.acctl{font-size:12.5px;color:var(--muted);margin-top:3px}
.setrow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px}
.setrow:last-child{border-bottom:none}
.setrow select{border:1px solid var(--line2);border-radius:8px;padding:6px 10px;font-size:14px}

/* ===== Yengil animatsiyalar ===== */
@keyframes cardin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.carcard,.lcard{animation:cardin .45s cubic-bezier(.2,.7,.2,1) both}
.cars>*:nth-child(1){animation-delay:.02s}.cars>*:nth-child(2){animation-delay:.06s}.cars>*:nth-child(3){animation-delay:.10s}
.cars>*:nth-child(4){animation-delay:.14s}.cars>*:nth-child(5){animation-delay:.18s}.cars>*:nth-child(6){animation-delay:.22s}
.cars>*:nth-child(7){animation-delay:.26s}.cars>*:nth-child(8){animation-delay:.30s}.cars>*:nth-child(9){animation-delay:.34s}

.carcard,.lcard{transition:transform .22s cubic-bezier(.2,.7,.2,1),border-color .22s,box-shadow .22s}
.carcard:hover{transform:translateY(-4px)}
.car-img .ph-img,.car-img .ph-ico{transition:transform .35s cubic-bezier(.2,.7,.2,1)}
.carcard:hover .ph-img,.carcard:hover .ph-ico{transform:scale(1.05)}

.rv{opacity:0;animation:fadeup .6s cubic-bezier(.2,.7,.2,1) forwards}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ============ CUSTOMS CALC ============ */
function dutyCalc(cat,cc,cval,isEV){if(isEV)return 0;let b,p;
 /* Real bozor misoliga moslangan (taxminiy — broker aniqlaydi).
    $20k 2.0L ishlatilgan ≈ $36.5k eshikkacha (manba: ustabor.uz/norma.uz) */
 if(cat==='new1'){b=.15;p=cc<=1500?.4:cc<=3000?.6:.9;}
 else if(cat==='new3'){b=.12;p=cc<=1500?.4:cc<=3000?.6:.9;}
 else{b=.10;p=.5;} return cval*b+cc*p;}
function utilBRV(age,cc,isEV){if(isEV)return 120;
 if(age<3){if(cc<1000)return 30;if(cc<=2000)return 120;if(cc<=3000)return 180;if(cc<=3500)return 180;return 300;}
 if(cc<1000)return 90;if(cc<=2000)return 210;if(cc<=3000)return 330;if(cc<=3500)return 390;return 480;}
function CALC(o){
 const price=+o.price||0,cval=+o.customsValue||price,repair=+o.repair||0,cc=+o.cc||0,year=+o.year||0;
 const fuel=o.fuel||'petrol',model=o.model||'A',logi=+o.logistics||2500,isEV=fuel==='ev';
 const brv=+o.brv||412000,usd=+o.usdRate||12900,vatR=o.vatRate!=null?+o.vatRate:.12;
 const exR=+o.exciseRate||4.8,commR=o.commRate!=null?+o.commRate:.05,fix=o.fixFee!=null?+o.fixFee:500;
 const age=Math.max(0,2026-year),cat=age<=1?'new1':age<=3?'new3':'used';
 const duty=dutyCalc(cat,cc,cval,isEV);
 const excise=(!isEV&&model==='B')?cc*exR:0;
 const util=(utilBRV(age,cc,isEV)*brv)/usd;
 const vat=(cval+duty+excise+util)*vatR;
 const comm=price*commR+fix;
 const total=price+repair+logi+duty+excise+util+vat+comm;
 return{age,cat,price,repair,logi,duty,excise,util,vat,comm,total,
  eligible:!(model==='A'&&!isEV&&age>7),
  breakdown:[['price',price+repair],['logi',logi],['duty',duty],['excise',excise],['util',util],['vat',vat],['comm',comm]]};
}
/* Pul birligi — tanlangan tilga (davlatga) bog'liq. USD baza, kurslar taxminiy (2026). */
const CUR={uz:{r:12900,suf:" so'm"},ru:{r:90,suf:" ₽"},kz:{r:525,suf:" ₸"},kg:{r:87,suf:" сом"},tg:{r:10.9,suf:" смн"},en:{pre:'$',r:1}};
function curOf(){return CUR[LANG]||CUR.en;}
function fmtUSD(n){return '$'+Math.round(+n||0).toLocaleString('en-US');}
function fmt(n){if(LANG==='en')return fmtUSD(n);const c=curOf();const v=Math.round((+n||0)*c.r);return (c.pre||'')+v.toLocaleString('ru-RU')+(c.suf||'');}
function fmtKm(n){return Number(n).toLocaleString('en-US')+' km';}
/* Import baholash: eligibility (qonuniy import mumkinmi) + tavsiya darajasi + ustama % */
function carEval(c){
  const r=CALC({price:c.price,customsValue:c.price,cc:c.cc,year:c.year,fuel:c.fuel,model:'A'});
  const age=2026-c.year, markup=Math.round((c.landed/c.price-1)*100);
  let rec; if(!r.eligible)rec='no'; else if(c.fuel==='ev'||c.fuel==='hybrid'||c.cc<=2000||age<=4)rec='good'; else rec='mid';
  return {eligible:r.eligible,markup,rec,age};
}
function recBadge(c){const e=carEval(c);const m={good:['ok','✅ '],mid:['mid','⚠️ '],no:['no','❌ ']};const k=m[e.rec];
  return `<span class="recb ${k[0]}">${k[1]}${T('rec_'+e.rec)}</span>`;}
CARS.forEach(c=>c.landed=CALC({price:c.price,customsValue:c.price,cc:c.cc,year:c.year,fuel:c.fuel,model:'A'}).total);

 uz:[["Moshinani bojxonadan kim o'tkazadi?","Litsenziyali bojxona brokeri sizning ishonchnomangiz asosida o'tkazadi. Siz bojxonada turishingiz shart emas."],
  ["Pulni qanday to'layman?","3 bosqichda: bron (inspeksiya), asosiy (moshina + logistika), yakuniy (boj + xizmat + yetkazish). Hammasi kompaniya hisobiga, hisob-faktura bilan."],
  ["Jismoniy shaxs yiliga nechta moshina olib kela oladi?","Yiliga 1 ta. Ko'p kerak bo'lsa — yuridik shaxs (B2B) modeli orqali."],
  ["Aksiz nima va men to'laymanmi?","Aksiz — moshinaga maxsus soliq. Jismoniy shaxs benzin/gibridga aksiz to'lamaydi — narx arzonlashadi. Faqat yuridik shaxs to'laydi."],
  ["Urilgan moshina bilan farqi bormi?","Ha — urilgan arzon, lekin ta'mir qo'shiladi va bojxona o'z baza qiymati bilan baholashi mumkin."],
  ["Moshina necha kunda keladi?","Odatda 25–50 kun. Har bosqichni onlayn kuzatasiz."],
  ["Qanday moshinalarni olib kelish mumkin?","Jismoniy shaxs uchun: 7 yoshgacha, Yevro-5+, o'ng rul taqiqlangan. Elektromobil — yoshi cheklovsiz."]],
 ru:[["Кто растаможивает авто?","Лицензированный таможенный брокер по вашей доверенности. Вам не нужно стоять на таможне."],
  ["Как я оплачиваю?","В 3 этапа: бронь (инспекция), основной (авто + логистика), финальный (пошлина + услуга + доставка). Всё на счёт компании."],
  ["Сколько авто в год может ввезти физлицо?","1 в год. Больше — через модель юрлица (B2B)."],
  ["Что такое акциз?","Спецналог на авто. Физлицо не платит акциз на бензин/гибрид — это удешевляет цену. Платит только юрлицо."],
  ["Разница с битым авто?","Да — битое дешевле, но добавляется ремонт, а таможня может оценить по своей базе."],
  ["За сколько дней приходит авто?","Обычно 25–50 дней. Каждый этап отслеживается онлайн."],
  ["Какие авто можно ввозить?","Для физлица: до 7 лет, Евро-5+, праворульные запрещены. Электромобиль — без ограничения по возрасту."]],
 en:[["Who clears the car through customs?","A licensed customs broker does it under your power of attorney. You don't need to be at customs."],
  ["How do I pay?","In 3 stages: booking (inspection), main (car + logistics), final (duty + service + delivery). All to the company account."],
  ["How many cars per year for an individual?","One per year. More — via the legal-entity (B2B) model."],
  ["What is excise?","A special car tax. An individual does NOT pay excise on petrol/hybrid — this lowers the price. Only legal entities pay it."],
  ["Difference with a damaged car?","Yes — cheaper, but repair is added and customs may value it by its reference base."],
  ["How long does delivery take?","Usually 25–50 days. You track each stage online."],
  ["Which cars can be imported?","For an individual: up to 7 years, Euro-5+, right-hand drive banned. EVs have no age limit."]]
};

/* --- Firebase (buyurtmalar bazasi, admin panel uchun) ---
   Sozlash: console.firebase.google.com da loyiha oching → Firestore Database yoqing →
   Project settings'dan Project ID va Web API key'ni quyiga yozing.
   Bo'sh bo'lsa sayt baribir ishlaydi (faqat email orqali). */
const FB_PROJECT='avtomost-83c8d';
const FB_KEY='AIzaSyBJjLI7UthElbehkTRGkbm9a3Z4_aNyRsM';
function fbSaveOrder(payload){
  if(!FB_PROJECT)return Promise.resolve();
  const fields={};Object.keys(payload).forEach(k=>{if(k[0]!=='_')fields[k]={stringValue:String(payload[k])};});
  fields.ts={integerValue:String(Date.now())};
  fields.sana={stringValue:new Date().toLocaleString()};
  fields.holat={stringValue:'yangi'};
  const url='https://firestore.googleapis.com/v1/projects/'+FB_PROJECT+'/databases/(default)/documents/orders'+(FB_KEY?('?key='+FB_KEY):'');
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})}).catch(()=>{});
}
function avtomostSaveLocal(o){try{const a=JSON.parse(localStorage.getItem('avtomost_orders')||'[]');a.unshift(Object.assign({sana:new Date().toLocaleString()},o));localStorage.setItem('avtomost_orders',JSON.stringify(a.slice(0,200)));}catch(e){}}
function avtomostSend(payload){
  avtomostSaveLocal(payload);
  fbSaveOrder(payload);
  return fetch('https://formsubmit.co/ajax/info@avtomostuz.com',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify(Object.assign({_subject:'🚗 AVTOMOST — yangi buyurtma',_template:'table'},payload))})
    .then(r=>r.json()).catch(()=>({success:false}));
}
function submitLead(){const n=val('lf_name'),p=val('lf_phone');if(!n||!p){alert(T('lf_err'));return;}
  const btn=(typeof event!=='undefined'&&event)?event.target:null;if(btn){btn.disabled=true;btn.style.opacity='.6';}
  avtomostSend({Turi:'Narx so‘rovi',Ism:n,Telefon:p,Moshina:val('lf_car')||'—',Byudjet:val('lf_budget')||'—'})
    .then(()=>{const ok=document.getElementById('lf_ok');if(ok)ok.style.display='block';if(btn){btn.disabled=false;btn.style.opacity='1';}});
}

function pickCalc(g,v,el){CALCSTATE[g]=v;el.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  if(g==='cond')document.getElementById('x_repairRow').style.display=v==='damaged'?'grid':'none';doCalc();}

function val(id){const e=document.getElementById(id);return e?e.value:'';}
function numv(id){return parseFloat(val(id))||0;}
function bindCalc(){cvalTouched=false;lastTotal=0;doCalc();}
function animTotal(to){const el=document.getElementById('x_total');if(!el)return;const from=lastTotal,t0=performance.now();
  function step(t){const p=Math.min(1,(t-t0)/420);el.textContent=fmt(from+(to-from)*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(step);}requestAnimationFrame(step);lastTotal=to;}
function doCalc(){
  if(!document.getElementById('x_price'))return;
  const price=numv('x_price');
  const r=CALC({price:price,customsValue:price,repair:CALCSTATE.cond==='damaged'?numv('x_repair'):0,
    cc:numv('x_cc'),year:numv('x_year'),fuel:CALCSTATE.fuel,model:val('x_model'),logistics:parseFloat(val('x_logi'))||2500,
    exciseRate:numv('x_ex'),vatRate:numv('x_vat')/100,brv:numv('x_brv'),usdRate:numv('x_rate'),commRate:numv('x_comm')/100,fixFee:numv('x_fix')});
  /* Xizmat haqi (komissiya) ko'rsatilmaydi — moshina narxi va logistikaga jimgina qo'shiladi */
  const commPerc=(numv('x_comm')/100)*r.price, commFix=numv('x_fix');
  const priceDisp=r.price+commPerc, logiDisp=r.logi+commFix;
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=fmt(v);};
  set('o_price',priceDisp);set('o_repair',r.repair);set('o_logi',logiDisp);set('o_duty',r.duty);set('o_excise',r.excise);set('o_util',r.util);set('o_vat',r.vat);
  animTotal(r.total);
  const lr=document.getElementById('ln_repair');if(lr)lr.style.display=CALCSTATE.cond==='damaged'?'flex':'none';

/* Filtr yon paneli (akkordeon) */
function buildFilters(){
  const counts={}; CARS.forEach(c=>counts[c.brand]=(counts[c.brand]||0)+1);
  const fcount={}; CARS.forEach(c=>fcount[c.fuel]=(fcount[c.fuel]||0)+1);
  const bcount={}; CARS.forEach(c=>bcount[c.body]=(bcount[c.body]||0)+1);
  const row=(type,val,label,cnt)=>{const on=CAT[type]&&CAT[type].has&&CAT[type].has(val);
    return `<div class="frow ${on?'on':''}" onclick="togF('${type}','${val}')"><span>${label}</span><span style="display:flex;gap:9px;align-items:center"><span class="cnt">${cnt||''}</span><span class="ck">${on?'✓':''}</span></span></div>`;};
  const acc=(titleKey,body,open)=>`<div class="facc ${open?'open':''}"><h4 onclick="this.parentElement.classList.toggle('open')">${T(titleKey)} <span class="cv">▾</span></h4><div class="fbody">${body}</div></div>`;
  const brands=[...new Set(CARS.map(c=>c.brand))];
  const brandRows=brands.map(b=>row('brand',b,b,counts[b])).join('');
  const fuelRows=[['petrol','fu_petrol'],['hybrid','fu_hybrid'],['ev','fu_ev']].map(f=>row('fuel',f[0],T(f[1]),fcount[f[0]])).join('');
  const bodyRows=[['sedan','body_sedan'],['suv','body_suv'],['crossover','body_crossover'],['minivan','body_minivan']].map(b=>row('body',b[0],T(b[1]),bcount[b[0]])).join('');
  const yearBody=`<input type="number" placeholder="2018+" value="${CAT.yearMin||''}" oninput="CAT.yearMin=+this.value||0;renderCars()">`;
  const kmBody=`<input type="number" placeholder="max km" value="${CAT.kmMax===Infinity?'':CAT.kmMax}" oninput="CAT.kmMax=+this.value||Infinity;renderCars()">`;
  const priceBody=`<div class="frange"><input type="number" placeholder="min $" value="${CAT.pmin||''}" oninput="CAT.pmin=+this.value||0;renderCars()"><input type="number" placeholder="max $" value="${CAT.pmax===Infinity?'':CAT.pmax}" oninput="CAT.pmax=+this.value||Infinity;renderCars()"></div>`;
  const accBody=`<div class="frow ${CAT.accident?'on':''}" onclick="CAT.accident=!CAT.accident;buildFilters();renderCars()"><span>${T('fl_accident')}</span><span class="ck">${CAT.accident?'✓':''}</span></div>`
    +`<div class="frow ${CAT.onlyOk?'on':''}" onclick="CAT.onlyOk=!CAT.onlyOk;buildFilters();renderCars()"><span>${T('fl_onlyok')}</span><span class="ck">${CAT.onlyOk?'✓':''}</span></div>`;
  document.getElementById('fSidebar').innerHTML=
    acc('fl_brand',brandRows,true)+acc('fl_fuel',fuelRows,true)+acc('fl_body',bodyRows,false)+
    acc('fl_year',yearBody,false)+acc('fl_km',kmBody,false)+acc('fl_price',priceBody,true)+acc('cond_title',accBody,true)+
    `<button class="fclear" onclick="clearF()">${T('fl_clear')}</button>`;
}

    </div>
    <div id="advResults" style="margin-top:22px"></div>
  </div>`;
}
function advPick(el){ADV[el.dataset.g]=el.dataset.v;el.parentElement.querySelectorAll('.advchip').forEach(b=>b.classList.toggle('on',b===el));}
function advScore(c,use){
  const ev=carEval(c),age=2026-c.year;let s=0;
  s+=Math.max(0,60-ev.markup)/2;
  s+=(c.km<40000?10:c.km<80000?5:0);
  s+=(age<=4?10:age<=6?5:0);
  if(c.accidentFree)s+=6;
  if(use==='family'){if(c.body==='suv'||c.body==='minivan'||c.body==='crossover')s+=22;if(c.cc>=2000)s+=5;}
  else if(use==='economy'){if(c.cc<=1600)s+=15;if(c.fuel==='hybrid'||c.fuel==='ev')s+=16;s+=Math.max(0,40000-c.landed)/2200;}
  else if(use==='premium'){if(['Genesis','BMW','Mercedes','Audi','Lexus'].includes(c.brand))s+=26;if((c.options||[]).length>5)s+=5;}
  else if(use==='business'){if(c.body==='sedan')s+=15;if(['Genesis','BMW','Mercedes','Hyundai','Kia'].includes(c.brand))s+=10;}
  else if(use==='first'){if(c.landed<25000)s+=16;if(c.cc<=2000)s+=10;if(c.km<60000)s+=6;}
  return s;
}
function advReasons(c){
  const ev=carEval(c),age=2026-c.year,out=[];
  if(ev.rec==='good')out.push(T('adv_r_good'));
  if(ev.markup<=45)out.push(T('adv_r_lowmk').replace('{m}',ev.markup));
  if(c.fuel==='ev'||c.fuel==='hybrid')out.push(T('adv_r_eco'));
  if(ADV.use==='family'&&(c.body==='suv'||c.body==='minivan'||c.body==='crossover'))out.push(T('adv_r_family'));
  if(ADV.use==='premium'&&['Genesis','BMW','Mercedes','Lexus','Audi'].includes(c.brand))out.push(T('adv_r_premium'));
  if(c.km<45000)out.push(T('adv_r_lowkm'));
  if(age<=4)out.push(T('adv_r_new'));
  if(c.accidentFree)out.push(T('adv_r_af'));
  return out.length?out:[T('adv_r_fit')];
}
function advCard(c,rank){
  const reasons=advReasons(c).slice(0,3);
  return `<div class="carcard advrec"><div class="advrank">#${rank+1}</div>
    <div class="car-img" onclick="nav('detail',${c.id})">${photoArea(c)}<div class="recwrap">${recBadge(c)}</div><div class="favwrap">${favHeart(c)}</div></div>
    <div class="car-body">
      <div onclick="nav('detail',${c.id})"><div class="car-title">${c.brand} ${c.model}</div>
      <div class="car-sub">${fmtKm(c.km)} · ${c.fuel==='ev'?'EV':c.cc+' sm³'}</div>

let IN_TERM=24;
function monthlyPay(principal,annualPct,months){const r=(annualPct/100)/12;if(r<=0)return principal/months;return principal*r/(1-Math.pow(1+r,-months));}
function installmentBox(landedUSD){
  IN_TERM=24;
  return `<div class="card" style="margin-top:16px" id="installCard">

      <div><label>${T('in_rate')}: <b id="in_rv">24%</b></label><input type="range" id="in_rate" min="0" max="48" step="2" value="24" oninput="calcInstall(${landedUSD})" style="width:100%;accent-color:var(--a2)"></div>
    </div>
    <label>${T('in_term')}</label>
    <div class="seg" id="in_term">
      ${[12,24,36,48].map(m=>`<button class="${m===24?'on':''}" data-m="${m}" onclick="setInTerm(${m},${landedUSD},this)">${m} ${T('in_mo')}</button>`).join('')}
    </div>
    <div class="paystage" style="margin-top:14px"><span style="font-weight:700">${T('in_monthly')}</span><span class="v grad-txt" id="in_monthly" style="font-size:22px">—</span></div>
    <div class="paystage"><span>${T('in_down')}</span><span class="v" id="in_downval">—</span></div>
    <div class="paystage" style="border-top:2px solid var(--line2)"><span>${T('in_total')}</span><span class="v" id="in_total">—</span></div>
    <div class="note">${T('in_note')}</div>
  </div>`;
}
function setInTerm(m,landed,btn){IN_TERM=m;document.querySelectorAll('#in_term button').forEach(b=>b.classList.toggle('on',+b.dataset.m===m));calcInstall(landed);}
function calcInstall(landedUSD){
  const de=document.getElementById('in_down'),re=document.getElementById('in_rate');if(!de||!re)return;
  const downPct=+de.value||0,ratePct=+re.value||0;
  const dv=document.getElementById('in_dv');if(dv)dv.textContent=downPct+'%';
  const rv=document.getElementById('in_rv');if(rv)rv.textContent=ratePct+'%';
  const down=landedUSD*downPct/100,principal=landedUSD-down;
  const m=monthlyPay(principal,ratePct,IN_TERM),tot=down+m*IN_TERM;
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('in_monthly',fmt(Math.round(m)));set('in_downval',fmt(Math.round(down)));set('in_total',fmt(Math.round(tot)));
}

  if(!o){box.innerHTML=`<div class="alert">${T('t_notfound')}</div>`;return;}

  const steps=TSTEPS.map((s,i)=>{const cls=i<o.stage?'done':i===o.stage?'now':'future';const ic=i<o.stage?'✓':(i===o.stage?'●':'');
    return `<div class="ts ${cls}"><div class="dot">${ic}</div><div><div class="tt">${T(s)}</div></div></div>`;}).join('');
  box.innerHTML=`<div class="card" style="display:flex;gap:16px;align-items:center;margin-bottom:18px"><div style="width:130px;flex:none">${carSVG(c.color)}</div>
    <div><div style="font-family:'Manrope';font-weight:800;font-size:19px">${c.brand} ${c.model}</div><div style="color:var(--faint);font-size:13px;margin:3px 0">${idv} · ${c.year}</div>
    <div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:6px"><div><div style="font-size:12px;color:var(--faint)">${T('t_status')}</div><div class="grad-txt" style="font-family:'Manrope';font-weight:700">${T(TSTEPS[o.stage])}</div></div>
    <div><div style="font-size:12px;color:var(--faint)">${T('t_eta')}</div><div style="font-family:'Manrope';font-weight:600">${o.eta}</div></div></div></div></div>
    <div class="card">${steps}</div>`;}

/* ---------- FAQ ---------- */
function faqView(){const list=FAQ[LANG]||FAQ.uz;
  return `<div class="wrap narrow" style="padding-top:26px">
    <h1 style="font-size:28px;font-weight:800">${T('faq_t')}</h1><p style="color:var(--muted);margin-bottom:22px">${T('faq_l')}</p>
    <div>${list.map((qa,i)=>`<div class="faq-item" id="fq${i}"><div class="faq-q" onclick="document.getElementById('fq${i}').classList.toggle('open')"><span>${qa[0]}</span><span class="pm">+</span></div><div class="faq-a"><p>${qa[1]}</p></div></div>`).join('')}</div>
    <div class="card" style="margin-top:24px;text-align:center"><h3 style="font-size:18px">${T('ask_t')}</h3><p style="color:var(--muted);margin:8px 0 14px">${T('ask_l')}</p><button class="btn" onclick="nav('catalog')">${T('nav_order')}</button></div>
  </div>`;
}

/* ---------- JONLI VALYUTA KURSI ---------- */
let RATES_LIVE=false, RATES_TIME='';
const RATE_MAP={uz:'UZS',ru:'RUB',kz:'KZT',kg:'KGS',tg:'TJS'};
const RATE_CACHE_KEY='avtomost_rates_v1', RATE_TTL=6*60*60*1000; // 6 soat kesh — limitni tejaydi
function applyRates(rates,time){
  Object.keys(RATE_MAP).forEach(k=>{const v=rates[RATE_MAP[k]];if(v&&CUR[k])CUR[k].r=v;});
  RATES_LIVE=true; RATES_TIME=time||new Date().toLocaleDateString();
  if(typeof render==='function')render();
}
function rateCacheGet(){try{const r=JSON.parse(localStorage.getItem(RATE_CACHE_KEY));if(r&&r.rates&&Date.now()-r.t<RATE_TTL)return r;}catch(e){}return null;}
function rateCacheSet(rates,time){try{localStorage.setItem(RATE_CACHE_KEY,JSON.stringify({t:Date.now(),rates,time}));}catch(e){}}
async function loadRates(){
  // 0) Kesh — 6 soat ichida bo'lsa so'rov yubormaymiz (limit tejaladi)
  const cached=rateCacheGet();
  if(cached){applyRates(cached.rates,cached.time);return;}
  // 1) Kalitli endpoint (asosiy)  2) kalitsiz ochiq endpoint (zaxira)
  // Kalitsiz bepul manba — xavfsizlik uchun maxfiy kalit koddan olib tashlandi.
  const sources=['https://open.er-api.com/v6/latest/USD'];
  for(const url of sources){
    try{
      const res=await fetch(url,{cache:'no-store'});
      const j=await res.json();
      const rates=j&&(j.conversion_rates||j.rates);
      if(rates&&rates.UZS){
        const time=j.time_last_update_utc?new Date(j.time_last_update_utc).toLocaleDateString():new Date().toLocaleDateString();
        applyRates(rates,time); rateCacheSet(rates,time); return;
      }
    }catch(e){/* internet yo'q — zaxira (taxminiy) kurslar ishlaydi */}
  }
}
function rateStatusHtml(){
  return RATES_LIVE
    ? `<span class="ratechip live" title="${RATES_TIME}">🟢 ${T('rate_live')}</span>`
    : `<span class="ratechip" title="zaxira">⚪ ${T('rate_approx')}</span>`;
}

/* ===== KABINET — ro'yxatdan o'tish / kirish (localStorage) ===== */
function usersLoad(){try{return JSON.parse(localStorage.getItem('avtomost_users')||'[]');}catch(e){return[];}}
function usersSave(u){try{localStorage.setItem('avtomost_users',JSON.stringify(u));}catch(e){}}
function curUser(){try{return JSON.parse(localStorage.getItem('avtomost_cur')||'null');}catch(e){return null;}}
function setCur(u){try{u?localStorage.setItem('avtomost_cur',JSON.stringify(u)):localStorage.removeItem('avtomost_cur');}catch(e){}updateAccBtn();}
function pwHash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return 'h'+(h>>>0);}
let AUTHTAB='login';
function badgeSvg(){return `<svg viewBox="0 0 24 24" fill="none"><path d="M3 13l2-5a3 3 0 0 1 2.8-2h8.4A3 3 0 0 1 19 8l2 5M5 17h14M6 13h12" stroke="#04122e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7.5" cy="17.5" r="1.6" fill="#04122e"/><circle cx="16.5" cy="17.5" r="1.6" fill="#04122e"/></svg>`;}
function openAccount(){curUser()?nav('account'):openAuth('login');}
function openAuth(t){AUTHTAB=t||'login';const m=document.getElementById('authModal');m.innerHTML=authModalHtml();m.classList.add('show');}
function closeAuth(){const m=document.getElementById('authModal');m.classList.remove('show');m.innerHTML='';}
function authTab(t){AUTHTAB=t;document.getElementById('authModal').innerHTML=authModalHtml();}
function authModalHtml(){const r=AUTHTAB==='reg';
 return `<div class="authcard">
  <button class="authx" onclick="closeAuth()">×</button>
  <div class="authlogo"><span class="mk">${badgeSvg()}</span> AVTO<b>MOST</b></div>
  <p class="authsub">${T('au_sub')}</p>
  <div class="authtabs"><button class="${!r?'on':''}" onclick="authTab('login')">${T('au_login')}</button><button class="${r?'on':''}" onclick="authTab('reg')">${T('au_reg')}</button></div>
  ${r?`<input id="au_name" class="auin" placeholder="${T('au_name')}">`:''}
  <input id="au_email" class="auin" type="email" placeholder="${T('au_email')}" autocomplete="email">
  <input id="au_pass" class="auin" type="password" placeholder="${T('au_pass')}">
  <div id="au_err" class="auerr"></div>
  <button class="btn lg" style="width:100%;margin-top:4px" onclick="${r?'doRegister()':'doLogin()'}">${r?T('au_reg'):T('au_login')} →</button>
  <div class="aunote">${T('au_note')}</div>
 </div>`;}
function av(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function doRegister(){const name=av('au_name'),email=av('au_email').toLowerCase(),pass=av('au_pass'),err=document.getElementById('au_err');
 if(!name||!email||!pass){err.textContent=T('au_e_fill');return;}
 if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){err.textContent=T('au_e_email');return;}
 if(pass.length<4){err.textContent=T('au_e_pass');return;}
 const users=usersLoad();if(users.some(u=>u.email===email)){err.textContent=T('au_e_exist');return;}
 users.push({name,email,pass:pwHash(pass),t:Date.now()});usersSave(users);setCur({name,email});closeAuth();nav('account');}
function doLogin(){const email=av('au_email').toLowerCase(),pass=av('au_pass'),err=document.getElementById('au_err');
 const u=usersLoad().find(x=>x.email===email);
 if(!u||u.pass!==pwHash(pass)){err.textContent=T('au_e_cred');return;}
 setCur({name:u.name,email:u.email});closeAuth();nav('account');}
function doLogout(){setCur(null);nav('home');}
function updateAccBtn(){const b=document.getElementById('accBtn');if(b)b.classList.toggle('logged',!!curUser());}
function accountView(){const u=curUser();
 if(!u)return `<div class="wrap" style="padding-top:24px"><div class="card" style="text-align:center;padding:46px 20px"><div style="font-size:40px">👤</div><p style="color:var(--muted);margin:10px 0 16px">${T('au_need')}</p><button class="btn" onclick="openAuth('login')">${T('au_login')}</button></div></div>`;
 const favN=(typeof FAV!=='undefined'?FAV.length:0),initials=(u.name||u.email)[0].toUpperCase();
 return `<div class="wrap" style="padding-top:24px;max-width:720px">
  <div class="acchead"><div class="accav">${initials}</div><div><div class="accname">${u.name}</div><div class="accmail">${u.email}</div></div></div>
  <div class="accgrid">
    <div class="acctile" onclick="nav('favorites')"><div class="acctn">${favN}</div><div class="acctl">${T('nav_fav')}</div></div>
    <div class="acctile" onclick="nav('catalog')"><div class="acctn">105</div><div class="acctl">${T('nav_catalog')}</div></div>
    <div class="acctile" onclick="nav('tracking')"><div class="acctn">🚚</div><div class="acctl">${T('nav_track')}</div></div>
  </div>
  <div class="card" style="margin-top:18px">
    <h3 style="font-size:16px;margin-bottom:12px">${T('set_title')}</h3>
    <div class="setrow"><span>${T('set_lang')}</span><select onchange="setLang(this.value)">${['uz','ru','kz','kg','tg','en'].map(l=>`<option value="${l}" ${LANG===l?'selected':''}>${l.toUpperCase()}</option>`).join('')}</select></div>
    <div class="setrow"><span>${T('set_acc')}</span><span style="color:var(--muted)">${u.email}</span></div>
  </div>
  <button class="btn ghost" style="margin-top:16px" onclick="doLogout()">${T('au_logout')}</button>
 </div>`;}

/* ---------- INIT ---------- */
applyStatic();
render();
loadRates();
updateAccBtn();
</script>
