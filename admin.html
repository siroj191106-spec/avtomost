<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>AVTOMOST — Admin panel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#f4f6fb;--card:#fff;--line:#e6eaf2;--txt:#0e1726;--muted:#5a6679;--a:#2563eb;--a2:#1f9e75;--warn:#d97706;--bad:#e11d48}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);padding:18px}
  .wrap{max-width:1200px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  .logo{font-weight:800;font-size:22px}.logo span{color:var(--a2)}
  .muted{color:var(--muted)}
  .btn{background:var(--a);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:14px}
  .btn.ghost{background:#fff;color:var(--txt);border:1px solid var(--line)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .gate{max-width:400px;margin:12vh auto;text-align:center}
  .gbtn{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 20px;font-weight:700;font-size:15px;cursor:pointer;margin-top:16px}
  .gbtn img{width:20px;height:20px}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-size:24px;font-weight:800;line-height:1}.stat .l{color:var(--muted);font-size:12.5px;margin-top:6px}
  .grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-bottom:16px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--muted)}
  .chip.on{background:var(--a);color:#fff;border-color:var(--a)}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--line)}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  th{background:#eef2f9;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  th.sortable{cursor:pointer;user-select:none}
  tr:last-child td{border-bottom:0}
  tbody tr{cursor:pointer}tbody tr:hover{background:#f7f9ff}
  .tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}
  .tag.yangi{background:#dbeafe;color:#1d4ed8}.tag.bogl{background:#fef3c7;color:#b45309}.tag.tasdiq{background:#dcfce7;color:#15803d}.tag.bekor{background:#fee2e2;color:#b91c1c}
  .typetag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
  .typetag.buy{background:#ede9fe;color:#6d28d9}.typetag.sorov{background:#e0f2fe;color:#0369a1}
  select.st{border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  a{color:var(--a)}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(8,12,24,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:18px}
  .modal.on{display:flex}
  .sheet{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:22px}
  .sheet h3{font-size:20px;margin-bottom:4px}
  .frow{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px}
  .frow .k{color:var(--muted)}.frow .v{font-weight:600;text-align:right}
  textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;font-family:inherit;min-height:70px;margin-top:6px}
  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--a2);color:#fff;padding:12px 22px;border-radius:12px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:200;display:none}
  @media(max-width:900px){.stats{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:1fr}}
  @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}table,thead,tbody,th,td,tr{display:block}th{display:none}td{border:0;padding:4px 0}tr{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#fff;display:block}td:before{content:attr(data-l);font-weight:700;color:var(--muted);font-size:12px;display:block}}
</style>
</head>
<body>

<div id="gate" class="gate card" style="display:none">
  <div class="logo" style="font-size:26px">AVTO<span>MOST</span></div>
  <div class="muted" style="margin:6px 0 4px">Admin panel</div>
  <div class="muted" style="font-size:13px">Faqat ruxsat berilgan akkaunt kira oladi</div>
  <button class="gbtn" id="signin"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">Google bilan kirish</button>
  <div id="gerr" style="color:var(--bad);font-size:13px;margin-top:12px;display:none"></div>
</div>

<div id="loading" class="empty">Yuklanmoqda…</div>

<div id="app" class="wrap" style="display:none">
  <div class="top">
    <div class="logo">AVTO<span>MOST</span> <span class="muted" style="font-weight:600;font-size:15px">· Boshqaruv paneli</span></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="muted" id="who" style="font-size:13px"></span>
      <button class="btn ghost" id="refresh">↻ Yangilash</button>
      <button class="btn ghost" id="csv">⬇ CSV</button>
      <button class="btn ghost" id="logout">Chiqish</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="grid2">
    <div class="card"><div style="font-weight:700;margin-bottom:10px">So‘nggi 14 kun — buyurtmalar</div><canvas id="chartDays" height="120"></canvas></div>
    <div class="card"><div style="font-weight:700;margin-bottom:10px">Holatlar bo‘yicha</div><canvas id="chartStatus" height="120"></canvas></div>
  </div>

  <div class="chips" id="chips"></div>
  <input id="q" placeholder="🔍 Qidirish: ism, telefon, moshina, raqam, shahar..." oninput="ADMIN.render()" style="width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:14px">
  <div id="list"></div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJjLI7UthElbehkTRGkbm9a3Z4_aNyRsM",
  authDomain: "avtomost-83c8d.firebaseapp.com",
  projectId: "avtomost-83c8d",
  storageBucket: "avtomost-83c8d.firebasestorage.app",
  messagingSenderId: "939227026884",
  appId: "1:939227026884:web:e3548b551dd0400b318091"
};
const ADMIN_EMAILS = ["siroj.191106@gmail.com"];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const $ = id => document.getElementById(id);
let ROWS=[], REFRESH=null, FILTER='all', SORTK='ts', SORTD=-1, lastCount=-1, chD=null, chS=null;
const STATUSES=['yangi','bogʻlanildi','tasdiqlandi','bekor'];
const tagClass={yangi:'yangi','bogʻlanildi':'bogl',tasdiqlandi:'tasdiq',bekor:'bekor'};

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function isBuy(r){return r.Turi&&String(r.Turi).toUpperCase().indexOf('BUYURTMA')>=0;}
function priceNum(r){const m=String(r.Eshikkacha||r.Byudjet||'').replace(/[^\d]/g,'');return m?+m:0;}
function dayKey(ts){const d=new Date(+ts||Date.now());return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

function showGate(msg){$('loading').style.display='none';$('app').style.display='none';$('gate').style.display='block';if(msg){$('gerr').textContent=msg;$('gerr').style.display='block';}}
function showApp(user){$('loading').style.display='none';$('gate').style.display='none';$('app').style.display='block';$('who').textContent=user.email;load();if(!REFRESH)REFRESH=setInterval(load,30000);}

onAuthStateChanged(auth,user=>{
  if(user && ADMIN_EMAILS.includes((user.email||'').toLowerCase())) showApp(user);
  else if(user){ signOut(auth); showGate('Bu akkaunt uchun ruxsat yo‘q: '+user.email); }
  else showGate('');
});

$('signin').onclick=()=>{$('gerr').style.display='none';signInWithPopup(auth,provider).catch(e=>showGate('Kirishda xato: '+e.message));};
$('logout').onclick=()=>signOut(auth).then(()=>location.reload());
$('refresh').onclick=load;
$('csv').onclick=exportCsv;
$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.remove('on');};

async function load(){
  try{
    const snap=await getDocs(collection(db,'orders'));
    const rows=[];snap.forEach(d=>{const o=d.data();o._id=d.id;rows.push(o);});
    if(lastCount>=0 && rows.length>lastCount){toast('🔔 Yangi buyurtma keldi!');beep();}
    lastCount=rows.length;
    ROWS=rows;render();drawCharts();
  }catch(e){$('list').innerHTML='<div class="card empty">O‘qishda xato: '+esc(e.message)+'</div>';}
}

function statBox(n,l,c){return `<div class="stat"><div class="n"${c?` style="color:${c}"`:''}>${n}</div><div class="l">${l}</div></div>`;}
function fmtSum(n){return n?Math.round(n).toLocaleString('ru-RU'):'0';}

function render(){
  const now=Date.now(), d1=864e5;
  const total=ROWS.length;
  const yangi=ROWS.filter(r=>(r.holat||'yangi')==='yangi').length;
  const buy=ROWS.filter(isBuy).length, sorov=total-buy;
  const bugun=ROWS.filter(r=>(now-(+r.ts||0))<d1).length;
  const hafta=ROWS.filter(r=>(now-(+r.ts||0))<7*d1).length;
  const buys=ROWS.filter(isBuy).map(priceNum).filter(x=>x>0);
  const avg=buys.length?buys.reduce((a,b)=>a+b,0)/buys.length:0;
  $('stats').innerHTML=
    statBox(total,'Jami')+statBox(yangi,'Yangi','#2563eb')+statBox(buy,'Buyurtma','#6d28d9')+
    statBox(sorov,'So‘rov','#0369a1')+statBox(bugun,'Bugun','#1f9e75')+statBox(hafta,'7 kun');
  // chips
  const counts={all:total,yangi:ROWS.filter(r=>(r.holat||'yangi')==='yangi').length,'bogʻlanildi':ROWS.filter(r=>r.holat==='bogʻlanildi').length,tasdiqlandi:ROWS.filter(r=>r.holat==='tasdiqlandi').length,bekor:ROWS.filter(r=>r.holat==='bekor').length,buy:buy,sorov:sorov};
  const chipDefs=[['all','Hammasi'],['yangi','Yangi'],['bogʻlanildi','Bogʻlanildi'],['tasdiqlandi','Tasdiqlangan'],['bekor','Bekor'],['buy','Buyurtmalar'],['sorov','So‘rovlar']];
  $('chips').innerHTML=chipDefs.map(c=>`<div class="chip ${FILTER===c[0]?'on':''}" data-f="${c[0]}">${c[1]} <span style="opacity:.7">${counts[c[0]]||0}</span></div>`).join('');
  $('chips').querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{FILTER=ch.dataset.f;render();});
  // filter + search
  const q=(($('q')||{}).value||'').toLowerCase().trim();
  let view=ROWS.map((r,i)=>({r,i})).filter(({r})=>{
    if(FILTER==='buy'&&!isBuy(r))return false;
    if(FILTER==='sorov'&&isBuy(r))return false;
    if(['yangi','bogʻlanildi','tasdiqlandi','bekor'].includes(FILTER)&&(r.holat||'yangi')!==FILTER)return false;
    if(q&&JSON.stringify(r).toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  view.sort((A,B)=>{const a=A.r,b=B.r;let x,y;if(SORTK==='price'){x=priceNum(a);y=priceNum(b);}else{x=+a.ts||0;y=+b.ts||0;}return (x-y)*SORTD;});
  const list=$('list');
  if(!view.length){list.innerHTML='<div class="card empty">'+(ROWS.length?'Hech narsa topilmadi.':'Hozircha buyurtma yo‘q.')+'</div>';return;}
  const arrow=k=>SORTK===k?(SORTD<0?' ↓':' ↑'):'';
  list.innerHTML='<table><thead><tr>'+
    `<th class="sortable" data-s="ts">Sana${arrow('ts')}</th><th>Tur</th><th>Ism</th><th>Telefon</th><th>Telegram</th><th>Shahar</th><th>Moshina</th><th class="sortable" data-s="price">Narx${arrow('price')}</th><th>Raqam</th><th>Holat</th>`+
    '</tr></thead><tbody>'+
    view.map(({r,i})=>{
      const h=r.holat||'yangi';
      return `<tr data-i="${i}">
        <td data-l="Sana">${esc(r.sana||'')}</td>
        <td data-l="Tur"><span class="typetag ${isBuy(r)?'buy':'sorov'}">${isBuy(r)?'Buyurtma':'So‘rov'}</span></td>
        <td data-l="Ism">${esc(r.Ism||'—')}</td>
        <td data-l="Telefon">${r.Telefon?`<a href="tel:${esc(String(r.Telefon).replace(/[^+\d]/g,''))}" onclick="event.stopPropagation()">${esc(r.Telefon)}</a>`:'—'}</td>
        <td data-l="Telegram">${r.Telegram&&r.Telegram!=='—'?`<a href="https://t.me/${esc(String(r.Telegram).replace(/^@/,''))}" target="_blank" onclick="event.stopPropagation()">${esc(r.Telegram)}</a>`:'—'}</td>
        <td data-l="Shahar">${esc(r.Shahar||'—')}</td>
        <td data-l="Moshina">${esc(r.Moshina||'—')}</td>
        <td data-l="Narx">${esc(r.Eshikkacha||r.Byudjet||'—')}</td>
        <td data-l="Raqam">${esc(r.Raqam||'—')}</td>
        <td data-l="Holat"><span class="tag ${tagClass[h]||'yangi'}">${esc(h)}</span></td>
      </tr>`;
    }).join('')+'</tbody></table>';
  list.querySelectorAll('th.sortable').forEach(th=>th.onclick=()=>{const k=th.dataset.s;if(SORTK===k)SORTD*=-1;else{SORTK=k;SORTD=-1;}render();});
  list.querySelectorAll('tbody tr').forEach(tr=>tr.onclick=()=>openModal(+tr.dataset.i));
}

function openModal(i){
  const r=ROWS[i];if(!r)return;
  const fields=[['Tur',isBuy(r)?'Buyurtma':'Narx so‘rovi'],['Raqam',r.Raqam],['Sana',r.sana],['Ism',r.Ism],['Telefon',r.Telefon],['Telegram',r.Telegram],['Shahar',r.Shahar],['Moshina',r.Moshina],['Narx',r.Eshikkacha],['Byudjet',r.Byudjet]];
  const h=r.holat||'yangi';
  $('sheet').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:start">
      <div><h3>${esc(r.Ism||'Buyurtma')}</h3><div class="muted" style="font-size:13px">${esc(r.Raqam||'')}</div></div>
      <span class="tag ${tagClass[h]||'yangi'}">${esc(h)}</span>
    </div>
    <div style="margin:10px 0">
      ${r.Telefon?`<a class="btn" style="text-decoration:none;display:inline-block;margin-right:8px" href="tel:${esc(String(r.Telefon).replace(/[^+\d]/g,''))}">📞 Qo‘ng‘iroq</a>`:''}
      ${r.Telegram&&r.Telegram!=='—'?`<a class="btn ghost" style="text-decoration:none;display:inline-block" target="_blank" href="https://t.me/${esc(String(r.Telegram).replace(/^@/,''))}">✈️ Telegram</a>`:''}
    </div>
    ${fields.filter(f=>f[1]&&f[1]!=='—').map(f=>`<div class="frow"><span class="k">${f[0]}</span><span class="v">${esc(f[1])}</span></div>`).join('')}
    <div style="margin-top:14px"><label style="font-weight:700;font-size:14px">Holat</label><br>
      <select id="m_status" class="st" style="margin-top:6px">${STATUSES.map(s=>`<option ${h===s?'selected':''}>${s}</option>`).join('')}</select>
    </div>
    <div style="margin-top:14px"><label style="font-weight:700;font-size:14px">Izoh (faqat siz ko‘rasiz)</label>
      <textarea id="m_note" placeholder="Mijoz haqida eslatma...">${esc(r.izoh||'')}</textarea></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px">
      <button class="btn ghost" id="m_close">Yopish</button>
      <button class="btn" id="m_save">Saqlash</button>
    </div>`;
  $('modal').classList.add('on');
  $('m_close').onclick=()=>$('modal').classList.remove('on');
  $('m_save').onclick=async()=>{
    try{
      const st=$('m_status').value, note=$('m_note').value;
      await updateDoc(doc(db,'orders',r._id),{holat:st,izoh:note});
      r.holat=st;r.izoh=note;$('modal').classList.remove('on');render();drawCharts();toast('✓ Saqlandi');
    }catch(e){alert('Saqlanmadi: '+e.message);}
  };
}

function drawCharts(){
  if(typeof Chart==='undefined')return;
  // last 14 days
  const labels=[],data=[];const now=new Date();
  for(let k=13;k>=0;k--){const d=new Date(now);d.setDate(now.getDate()-k);labels.push((d.getMonth()+1)+'/'+d.getDate());const key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();data.push(ROWS.filter(r=>dayKey(r.ts)===key).length);}
  const dc=$('chartDays').getContext('2d');
  if(chD)chD.destroy();
  chD=new Chart(dc,{type:'bar',data:{labels,datasets:[{data,backgroundColor:'#2563eb',borderRadius:5}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}},responsive:true,maintainAspectRatio:false}});
  // status donut
  const order=['yangi','bogʻlanildi','tasdiqlandi','bekor'];
  const cnt=order.map(s=>ROWS.filter(r=>(r.holat||'yangi')===s).length);
  const sc=$('chartStatus').getContext('2d');
  if(chS)chS.destroy();
  chS=new Chart(sc,{type:'doughnut',data:{labels:['Yangi','Bogʻlanildi','Tasdiqlangan','Bekor'],datasets:[{data:cnt,backgroundColor:['#3b82f6','#f59e0b','#22c55e','#ef4444']}]},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},responsive:true,maintainAspectRatio:false}});
}

let toastT=null;
function toast(msg){const t=$('toast');t.textContent=msg;t.style.display='block';clearTimeout(toastT);toastT=setTimeout(()=>t.style.display='none',3000);}
function beep(){try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.08;o.start();setTimeout(()=>{o.stop();a.close();},220);}catch(e){}}

function exportCsv(){
  const cols=['sana','Turi','Ism','Telefon','Telegram','Shahar','Moshina','Eshikkacha','Byudjet','Raqam','holat','izoh'];
  const lines=[cols.join(',')].concat(ROWS.map(r=>cols.map(c=>'"'+String(r[c]||'').replace(/"/g,'""')+'"').join(',')));
  const blob=new Blob(['﻿'+lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='avtomost-buyurtmalar.csv';a.click();
}

window.ADMIN={render};
</script>
</body>
</html>
