<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>AVTOMOST — Admin panel</title>
<style>
  :root{--bg:#f6f8fc;--card:#fff;--line:#e6eaf2;--txt:#0e1726;--muted:#5a6679;--a:#2563eb;--a2:#1f9e75;--warn:#d97706;--bad:#e11d48}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);padding:18px}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px}
  .logo{font-weight:800;font-size:22px}.logo span{color:var(--a2)}
  .muted{color:var(--muted)}
  .btn{background:var(--a);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:14px}
  .btn.ghost{background:#fff;color:var(--txt);border:1px solid var(--line)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .gate{max-width:400px;margin:12vh auto;text-align:center}
  .gbtn{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 20px;font-weight:700;font-size:15px;cursor:pointer;margin-top:16px}
  .gbtn img{width:20px;height:20px}
  .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;flex:1;min-width:120px}
  .stat .n{font-size:26px;font-weight:800}.stat .l{color:var(--muted);font-size:13px}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--line)}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  th{background:#eef2f9;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  tr:last-child td{border-bottom:0}
  .tag{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:700}
  .tag.yangi{background:#dbeafe;color:#1d4ed8}.tag.tasdiq{background:#dcfce7;color:#15803d}.tag.bekor{background:#fee2e2;color:#b91c1c}
  select.st{border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:13px}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .wrap{max-width:1100px;margin:0 auto}
  a{color:var(--a)}
  @media(max-width:640px){table,thead,tbody,th,td,tr{display:block}th{display:none}td{border:0;padding:4px 0}tr{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#fff;display:block}td:before{content:attr(data-l);font-weight:700;color:var(--muted);font-size:12px;display:block}}
</style>
</head>
<body>

<div id="gate" class="gate card" style="display:none">
  <div class="logo" style="font-size:26px">AVTO<span>MOST</span></div>
  <div class="muted" style="margin:6px 0 4px">Admin panel</div>
  <div class="muted" style="font-size:13px">Faqat ruxsat berilgan akkaunt kira oladi</div>
  <button class="gbtn" id="signin">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">Google bilan kirish
  </button>
  <div id="gerr" style="color:var(--bad);font-size:13px;margin-top:12px;display:none"></div>
</div>

<div id="loading" class="empty">Yuklanmoqda…</div>

<div id="app" class="wrap" style="display:none">
  <div class="top">
    <div class="logo">AVTO<span>MOST</span> <span class="muted" style="font-weight:600;font-size:15px">· Buyurtmalar</span></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="muted" id="who" style="font-size:13px"></span>
      <button class="btn ghost" id="refresh">↻ Yangilash</button>
      <button class="btn ghost" id="csv">⬇ CSV</button>
      <button class="btn ghost" id="logout">Chiqish</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <input id="q" placeholder="🔍 Qidirish: ism, telefon, moshina, raqam..." oninput="ADMIN.render()" style="width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:14px">
  <div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBJjLI7UthElbehkTRGkbm9a3Z4_aNyRsM",
  authDomain: "avtomost-83c8d.firebaseapp.com",
  projectId: "avtomost-83c8d",
  storageBucket: "avtomost-83c8d.firebasestorage.app",
  messagingSenderId: "939227026884",
  appId: "1:939227026884:web:e3548b551dd0400b318091"
};
const ADMIN_EMAILS = ["siroj.191106@gmail.com"]; // ruxsat berilgan adminlar

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const $ = id => document.getElementById(id);
let ROWS = [], REFRESH = null;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function showGate(msg){
  $('loading').style.display='none';$('app').style.display='none';$('gate').style.display='block';
  if(msg){$('gerr').textContent=msg;$('gerr').style.display='block';}
}
function showApp(user){
  $('loading').style.display='none';$('gate').style.display='none';$('app').style.display='block';
  $('who').textContent=user.email;
  load();
  if(!REFRESH)REFRESH=setInterval(load,30000);
}

onAuthStateChanged(auth, user=>{
  if(user && ADMIN_EMAILS.includes((user.email||'').toLowerCase())) showApp(user);
  else if(user){ signOut(auth); showGate('Bu akkaunt uchun ruxsat yo‘q: '+user.email); }
  else showGate('');
});

$('signin').onclick = ()=>{ $('gerr').style.display='none'; signInWithPopup(auth,provider).catch(e=>showGate('Kirishda xato: '+e.message)); };
$('logout').onclick = ()=> signOut(auth).then(()=>location.reload());
$('refresh').onclick = load;
$('csv').onclick = exportCsv;

async function load(){
  try{
    const snap = await getDocs(collection(db,'orders'));
    const rows=[];
    snap.forEach(d=>{const o=d.data();o._id=d.id;rows.push(o);});
    rows.sort((a,b)=>(b.ts||0)-(a.ts||0));
    ROWS=rows; render();
  }catch(e){ $('list').innerHTML='<div class="card empty">O‘qishda xato: '+esc(e.message)+'</div>'; }
}

function render(){
  const total=ROWS.length, yangi=ROWS.filter(r=>(r.holat||'yangi')==='yangi').length,
        buy=ROWS.filter(r=>r.Turi&&String(r.Turi).toUpperCase().indexOf('BUYURTMA')>=0).length;
  $('stats').innerHTML=`
    <div class="stat"><div class="n">${total}</div><div class="l">Jami</div></div>
    <div class="stat"><div class="n" style="color:var(--a)">${yangi}</div><div class="l">Yangi</div></div>
    <div class="stat"><div class="n" style="color:var(--a2)">${buy}</div><div class="l">Buyurtma</div></div>`;
  const list=$('list');
  const q=(($('q')||{}).value||'').toLowerCase().trim();
  const view=ROWS.map((r,i)=>({r,i})).filter(({r})=>!q||JSON.stringify(r).toLowerCase().indexOf(q)>=0);
  if(!view.length){list.innerHTML='<div class="card empty">'+(ROWS.length?'Hech narsa topilmadi.':'Hozircha buyurtma yo‘q.')+'</div>';return;}
  list.innerHTML='<table><thead><tr><th>Sana</th><th>Turi</th><th>Ism</th><th>Telefon</th><th>Telegram</th><th>Shahar</th><th>Moshina</th><th>Narx</th><th>Raqam</th><th>Holat</th></tr></thead><tbody>'+
    view.map(({r,i})=>{
      const h=r.holat||'yangi';const tagc=h==='tasdiqlandi'?'tasdiq':(h==='bekor'?'bekor':'yangi');
      return `<tr>
        <td data-l="Sana">${esc(r.sana||'')}</td>
        <td data-l="Turi">${esc(r.Turi||'—')}</td>
        <td data-l="Ism">${esc(r.Ism||'—')}</td>
        <td data-l="Telefon">${r.Telefon?`<a href="tel:${esc(String(r.Telefon).replace(/[^+\d]/g,''))}">${esc(r.Telefon)}</a>`:'—'}</td>
        <td data-l="Telegram">${r.Telegram&&r.Telegram!=='—'?`<a href="https://t.me/${esc(String(r.Telegram).replace(/^@/,''))}" target="_blank">${esc(r.Telegram)}</a>`:'—'}</td>
        <td data-l="Shahar">${esc(r.Shahar||r.Byudjet||'—')}</td>
        <td data-l="Moshina">${esc(r.Moshina||'—')}</td>
        <td data-l="Narx">${esc(r.Eshikkacha||'—')}</td>
        <td data-l="Raqam">${esc(r.Raqam||'—')}</td>
        <td data-l="Holat"><span class="tag ${tagc}">${esc(h)}</span><br><select class="st" data-id="${esc(r._id)}"><option ${h==='yangi'?'selected':''}>yangi</option><option ${h==='tasdiqlandi'?'selected':''}>tasdiqlandi</option><option ${h==='bekor'?'selected':''}>bekor</option></select></td>
      </tr>`;
    }).join('')+'</tbody></table>';
  list.querySelectorAll('select.st').forEach(sel=>{
    sel.onchange=async()=>{
      try{ await updateDoc(doc(db,'orders',sel.dataset.id),{holat:sel.value});
        const row=ROWS.find(r=>r._id===sel.dataset.id);if(row)row.holat=sel.value;render();
      }catch(e){alert('Saqlanmadi: '+e.message);}
    };
  });
}

function exportCsv(){
  const cols=['sana','Turi','Ism','Telefon','Telegram','Shahar','Moshina','Eshikkacha','Raqam','holat'];
  const lines=[cols.join(',')].concat(ROWS.map(r=>cols.map(c=>'"'+String(r[c]||'').replace(/"/g,'""')+'"').join(',')));
  const blob=new Blob(['﻿'+lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='avtomost-buyurtmalar.csv';a.click();
}

// search input uses inline ADMIN.render
window.ADMIN={render};
</script>
</body>
</html>
